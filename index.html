<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电影节排片工具</title>
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <h1>Film<span>Fest</span></h1>
        <p class="header-sub">电影节快速排片工具</p>
    </div>
</header>

<!-- Upload -->
<section class="section" id="uploadSection">
    <div class="upload-area" id="uploadArea">
        <div class="upload-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <p class="upload-text">点击或拖拽文件到此处</p>
        <p class="upload-hint">支持 .csv / .xlsx 格式排片表</p>
        <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" hidden>
    </div>
    <div class="file-info" id="fileInfo">
        <span class="file-chip" id="fileName"></span>
        <button class="btn btn-ghost btn-sm" onclick="window._app.loadNewFile()">重新选择</button>
    </div>
</section>

<div class="error-toast" id="errorMessage"></div>

<!-- Main Content -->
<main class="main-content" id="mainContent">
    <div class="layout">

        <!-- Left: Filters + Results -->
        <div class="panel-left">
            <!-- Filters -->
            <div class="filter-bar">
                <div class="filter-row">
                    <div class="filter-group">
                        <label>单元</label>
                        <select id="unitFilter"><option value="">全部</option></select>
                    </div>
                    <div class="filter-group">
                        <label>日期</label>
                        <div class="multi-select-container">
                            <div class="multi-select-trigger" onclick="window._app.toggleDateDropdown(event)">
                                <span id="dateFilterText">全部日期</span>
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                            </div>
                            <div class="multi-select-dropdown" id="dateDropdown">
                                <div class="ms-search">
                                    <input type="text" placeholder="搜索日期..." onkeyup="window._app.filterDateOptions(this.value)">
                                </div>
                                <div class="ms-quick">
                                    <button onclick="window._app.selectWeekend()">周末</button>
                                    <button onclick="window._app.selectWeekdays()">工作日</button>
                                </div>
                                <div class="ms-options" id="dateOptions">
                                    <label class="multi-select-option">
                                        <input type="checkbox" value="all" onchange="window._app.toggleAllDates(this)">
                                        <span>全选</span>
                                    </label>
                                </div>
                                <div class="ms-actions">
                                    <button class="btn btn-primary btn-sm" onclick="window._app.applyDateFilter()">确定</button>
                                    <button class="btn btn-ghost btn-sm" onclick="window._app.clearDateFilter()">清空</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="filter-group">
                        <label>影院</label>
                        <select id="cinemaFilter"><option value="">全部</option></select>
                    </div>
                    <div class="filter-group">
                        <label>片名</label>
                        <input type="text" id="movieNameFilter" placeholder="中文或英文">
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-group">
                        <label>导演</label>
                        <input type="text" id="directorFilter" placeholder="导演名称">
                    </div>
                    <div class="filter-group">
                        <label>国家/地区</label>
                        <select id="countryFilter"><option value="">全部</option></select>
                    </div>
                    <div class="filter-group">
                        <label>活动</label>
                        <select id="meetFilter">
                            <option value="">全部</option>
                            <option value="yes">有活动</option>
                            <option value="no">无活动</option>
                        </select>
                    </div>
                    <div class="filter-group filter-actions">
                        <button class="btn btn-primary" onclick="window._app.applyFilters()">筛选</button>
                        <button class="btn btn-ghost" onclick="window._app.resetFilters()">重置</button>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div class="results-bar">
                <span>共 <strong id="resultCount">0</strong> 场放映</span>
            </div>
            <div class="movie-grid" id="movieGrid"></div>
        </div>

        <!-- Right: Selection Panel -->
        <aside class="panel-right">
            <div class="panel-sticky">
                <div class="panel-header">
                    <h2>已选电影</h2>
                    <span class="count-badge" id="selectionCount">0</span>
                </div>
                <div class="sel-list" id="selectedMovies">
                    <div class="empty-state">暂未选择任何电影</div>
                </div>
                <div class="panel-actions">
                    <button class="btn btn-primary" onclick="window._app.generateCalendar()">日历视图</button>
                    <button class="btn btn-accent" onclick="window._app.exportSelection()">导出</button>
                    <button class="btn btn-outline" onclick="window._app.generateShareImage()">分享图片</button>
                    <button class="btn btn-ghost" onclick="window._app.showImportOptions()">导入</button>
                    <button class="btn btn-danger-ghost" onclick="window._app.clearSelection()">清空</button>
                </div>
            </div>
        </aside>

    </div>
</main>

<!-- Calendar Modal -->
<div class="modal-overlay" id="calendarModal">
    <div class="modal-box modal-wide">
        <div class="modal-header">
            <h2>观影日历</h2>
            <button class="btn-close" onclick="window._app.closeCalendar()">&times;</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="modal-footer">
            <button class="btn btn-primary" onclick="window._app.exportCalendar()">导出网页</button>
            <button class="btn btn-accent" onclick="window._app.exportToICS()">导出 .ics</button>
            <button class="btn btn-ghost" onclick="window._app.closeCalendar()">关闭</button>
        </div>
    </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay export-modal" id="exportModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>导出观影计划</h2>
            <button class="btn-close" onclick="window._app.closeExportModal()">&times;</button>
        </div>
        <div id="exportModalBody"></div>
    </div>
</div>

<!-- Share Modal -->
<div class="modal-overlay" id="shareModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>分享图片</h2>
            <button class="btn-close" onclick="window._app.closeShareModal()">&times;</button>
        </div>
        <div class="share-modal-body"></div>
    </div>
</div>

<footer class="footer">
    <p>&copy; Lin0u0 &middot; 本系统仅供个人排片参考，具体信息以官方发布为准</p>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
